<!DOCTYPE html>
<html lang="en" style="height:100%">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haifa Events — Coming Soon</title>
  <meta name="description" content="Events in Haifa — concerts, culture, food &amp; more" />
  <meta property="og:title" content="haifa.events" />
  <meta property="og:description" content="Everything happening in Haifa — in one place" />
  <meta property="og:image" content="https://haifa.events/og-image.png" />
  <meta property="og:url" content="https://haifa.events" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: #ffffff;
      color: #111111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      text-align: center;
    }

    .logo {
      margin-bottom: 64px;
      user-select: none;
    }

    .logo-haifa {
      display: block;
      font-weight: 300;
      font-size: clamp(14px, 2.5vw, 22px);
      letter-spacing: 0.15em;
      color: #111;
      margin-bottom: 4px;
    }

    .logo-events {
      display: block;
      font-weight: 700;
      font-size: clamp(22px, 4vw, 38px);
      letter-spacing: 0.04em;
      color: #111;
      line-height: 1;
    }

    .coming-soon {
      font-weight: 300;
      font-size: clamp(28px, 5vw, 52px);
      letter-spacing: 0.18em;
      color: #111;
      text-transform: uppercase;
    }

    .tagline {
      font-weight: 300;
      font-size: clamp(13px, 1.5vw, 16px);
      letter-spacing: 0.08em;
      color: #888;
      margin-top: 20px;
      margin-bottom: 40px;
    }

    /* Telegram button */
    .tg-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 12px 26px;
      background: transparent;
      color: #111;
      font-family: 'Sora', sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.1em;
      border: 1px solid #ccc;
      border-radius: 100px;
      cursor: pointer;
      transition: border-color .25s, color .25s, box-shadow .25s;
    }
    .tg-btn:hover {
      border-color: #111;
      box-shadow: 0 2px 16px rgba(0,0,0,.07);
    }
    .tg-btn svg { flex-shrink: 0; opacity: .7; }

    /* Language picker */
    .lang-picker {
      display: flex;
      flex-direction: row;
      gap: 8px;
      margin-top: 14px;
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
    }
    .lang-picker.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .lang-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border: 1px solid #e5e5e5;
      border-radius: 100px;
      text-decoration: none;
      font-family: 'Sora', sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.04em;
      color: #333;
      background: #fff;
      transition: border-color .2s, box-shadow .2s, color .2s;
      white-space: nowrap;
    }
    .lang-link:hover {
      border-color: #111;
      color: #111;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }

    footer {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>

  <main>
    <div class="logo">
      <span class="logo-haifa">haifa</span>
      <span class="logo-events">events</span>
    </div>

    <h1 class="coming-soon">Coming Soon</h1>

    <p class="tagline">Events in Haifa — concerts, culture, food &amp; more</p>

    <button class="tg-btn" onclick="document.getElementById('langs').classList.toggle('open')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.68 7.92c-.12.56-.44.7-.9.44l-2.5-1.84-1.2 1.16c-.13.13-.25.25-.5.25l.18-2.52 4.6-4.16c.2-.18-.04-.28-.3-.1L8.12 14.4 5.66 13.6c-.56-.18-.57-.56.12-.82l8.96-3.46c.47-.17.88.1.9.48z" fill="white"/>
      </svg>
      Join on Telegram
    </button>

    <div class="lang-picker" id="langs">
      <a class="lang-link" href="https://t.me/haifaevents_he" target="_blank" rel="noopener">🇮🇱 עברית</a>
      <a class="lang-link" href="https://t.me/haifaevents_ru" target="_blank" rel="noopener">🇷🇺 Русский</a>
      <a class="lang-link" href="https://t.me/haifaevents_en" target="_blank" rel="noopener">🇬🇧 English</a>
    </div>

  </main>

  <footer>© 2026 Haifa Events. All rights reserved.</footer>

</body>
</html>
